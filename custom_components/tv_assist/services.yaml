play_sound:
  name: Play sound
  description: Play an audio file (chime/MP3/WAV) through the TV speakers.
  fields:
    device_id:
      name: Device (dropdown)
      description: Pick the TV from the dropdown.
      required: false
      selector:
        device:
          integration: tv_assist
    target:
      name: Device identifier (stable)
      description: Stable identifier you set when adding the TV (e.g. bedroom_tv).
      required: false
      selector:
        text:
    host:
      name: Host
      description: Manual host or host:port (e.g. 192.168.1.50:8455).
      required: false
      selector:
        text:
    sound:
      name: Sound URL
      description: "A URL to an audio file the TV can reach (e.g. http://homeassistant:8123/local/doorbell.mp3)."
      required: true
      example: "http://homeassistant.local:8123/local/doorbell.mp3"
      selector:
        text:
    volume:
      name: Volume
      description: "Volume 0–100 (relative to the TV volume). Blank = this TV's Audio-settings default."
      required: false
      example: 80
      selector:
        number:
          min: 0
          max: 100
          step: 5
          mode: slider
    duck:
      name: Duck TV audio
      description: Lower the current TV audio while the sound plays (default on).
      required: false
      selector:
        boolean:
